<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Property Value Tracker</title>
<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

<div class="card hero">
<h1>Property Value Tracker</h1>
<div id="address" class="sub"></div>
<div id="avg" class="value">$0</div>
<div id="updated" class="updated"></div>
</div>

<div class="stats-grid">

<div class="stat-card">
<div class="stat-title">Purchase Price</div>
<div id="purchasePrice" class="stat-value">$0</div>
</div>

<div class="stat-card">
<div class="stat-title">Estimated Equity</div>
<div id="equity" class="stat-value">$0</div>
</div>

<div class="stat-card">
<div class="stat-title">Mortgage Balance</div>
<div id="mortgage" class="stat-value">$0</div>
</div>

<div class="stat-card">
<div class="stat-title">12-Month Growth</div>
<div id="growth" class="stat-value">0%</div>
</div>

</div>

<div class="card">
<table>
<thead>
<tr>
<th>Source</th>
<th>Estimate</th>
</tr>
</thead>

<tbody id="rows"></tbody>

<tfoot>
<tr class="avg">
<td>Average</td>
<td id="avg2"></td>
</tr>
</tfoot>

</table>
</div>

<div class="card">
<h2>12-Month Value Trend</h2>
<canvas id="historyChart" height="120"></canvas>
</div>

<div class="footer">
Property Value Tracker
</div>

</div>

<script src="app.js"></script>

</body>
</html>
