<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Property Value Tracker</title>
<style>
body{margin:0;background:#eef3f8;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:#222}
.container{max-width:980px;margin:40px auto;padding:20px}
.card{background:#fff;border-radius:18px;padding:28px;box-shadow:0 10px 30px rgba(0,0,0,.08);margin-bottom:24px}
h1{margin:0;font-size:2rem}
.sub{color:#666;margin-top:6px}
.value{font-size:3.6rem;font-weight:700;color:#1565C0;margin:18px 0 6px}
.updated{color:#777}
table{width:100%;border-collapse:collapse}
th,td{padding:14px;border-bottom:1px solid #eee}
th{text-align:left}
td:last-child{text-align:right}
.avg td{font-size:1.2rem;font-weight:700}
.footer{text-align:center;color:#777;padding:20px}
</style>
</head>
<body>
<div class="container">
<div class="card">
<h1>Property Value Tracker</h1>
<div id="address" class="sub"></div>
<div id="avg" class="value">$0</div>
<div id="updated" class="updated"></div>
</div>

<div class="card">
<table>
<thead><tr><th>Source</th><th>Estimate</th></tr></thead>
<tbody id="rows"></tbody>
<tfoot>
<tr class="avg"><td>Average</td><td id="avg2"></td></tr>
</tfoot>
</table>
</div>

<div class="footer">Powered by GitHub Pages</div>
</div>

<script>
fetch("data.json")
.then(r=>r.json())
.then(data=>{
 const fmt=n=>n==null?"—":"$"+n.toLocaleString();
 document.getElementById("address").textContent=
   `${data.property.name}, ${data.property.city}, ${data.property.state}`;
 document.getElementById("updated").textContent=
   "Last Updated: "+data.lastUpdated;

 const names={
   realtor:"Realtor.com",
   redfin:"Redfin",
   zillow:"Zillow",
   trulia:"Trulia",
   homes:"Homes.com"
 };

 let total=0,count=0;
 const tbody=document.getElementById("rows");

 Object.keys(names).forEach(k=>{
   const v=data.values[k];
   if(v!=null){total+=v;count++;}
   const tr=document.createElement("tr");
   tr.innerHTML=`<td>${names[k]}</td><td>${fmt(v)}</td>`;
   tbody.appendChild(tr);
 });

 const avg=Math.round(total/count);
 document.getElementById("avg").textContent=fmt(avg);
 document.getElementById("avg2").textContent=fmt(avg);
});
</script>
</body>
</html>
