<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paddington Dashboard</title>

<style>
body{
    margin:0;
    background:#f5f7fb;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

.container{
    max-width:900px;
    margin:40px auto;
    padding:20px;
}

.card{
    background:white;
    border-radius:18px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

h1{
    margin:0;
    font-size:34px;
}

.address{
    color:#666;
    margin-top:8px;
}

.value{
    font-size:58px;
    font-weight:700;
    color:#1565C0;
    margin-top:35px;
}

.updated{
    color:#777;
    margin-top:8px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:35px;
}

td{
    padding:14px 0;
    border-bottom:1px solid #ececec;
    font-size:18px;
}

td:last-child{
    text-align:right;
    font-weight:600;
}

.average{
    font-size:24px;
    font-weight:700;
}

.footer{
    text-align:center;
    color:#888;
    margin-top:40px;
    font-size:14px;
}
</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>904 Paddington Ct</h1>

<div class="address">
Chesapeake, Virginia
</div>

<div class="value">
$602,048
</div>

<div class="updated">
Last Updated: July 3, 2026
</div>

<table>

<tr>
<td>Realtor.com</td>
<td>$598,573</td>
</tr>

<tr>
<td>Redfin</td>
<td>$601,218</td>
</tr>

<tr>
<td>Zillow</td>
<td>$604,200</td>
</tr>

<tr>
<td>Trulia</td>
<td>$604,200</td>
</tr>

<tr>
<td>Homes.com</td>
<td>—</td>
</tr>

<tr class="average">
<td>Average</td>
<td>$602,048</td>
</tr>

</table>

</div>

<div class="footer">
Paddington Home Value Dashboard
</div>

</div>

</body>
</html>
